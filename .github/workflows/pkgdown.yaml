on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(dest_dir = "pkgdown-site", new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload pkgdown site
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: pkgdown-site
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: build
    # Initial-publication gate only; unpublish Pages separately if a published repository becomes private.
    if: github.event_name != 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pkgdown
    steps:
      - uses: actions/checkout@v6

      - name: Download pkgdown site
        uses: actions/download-artifact@v4
        with:
          name: pkgdown-site
          path: pkgdown-site

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: pkgdown-site
